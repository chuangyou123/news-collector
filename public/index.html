<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📰 新闻收集站</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- 顶部导航 -->
  <header>
    <div class="header-inner">
      <h1>📰 新闻收集站</h1>

      <!-- 未登录 -->
      <div class="user-area" id="userArea">
        <input type="text" id="usernameInput" placeholder="昵称" maxlength="20" autocomplete="username">
        <input type="password" id="passwordInput" placeholder="密码" maxlength="50" autocomplete="current-password">
        <button id="loginBtn" class="btn-primary-sm">登录</button>
        <button id="switchToRegisterBtn" class="btn-outline-sm">注册</button>
      </div>

      <!-- 已登录 -->
      <div class="user-info" id="userInfo" style="display:none;">
        <span class="user-badge" id="userBadge"></span>
        <button id="adminBtn" class="btn-admin" style="display:none;" title="管理面板">⚙️</button>
        <button id="logoutBtn" class="btn-sm">退出</button>
      </div>
    </div>
  </header>

  <!-- 主布局 -->
  <div class="main-container">
    <!-- 左侧：新闻区 -->
    <div class="news-section">
      <div class="upload-card" id="uploadCard" style="display:none;">
        <h3>📝 分享新闻</h3>
        <form id="newsForm" autocomplete="off">
          <div class="form-row">
            <input type="text" id="titleInput" placeholder="新闻标题（5-50字）*" maxlength="50" required>
            <input type="url" id="urlInput" placeholder="链接（可选）" maxlength="500">
          </div>
          <textarea id="summaryInput" placeholder="摘要或评论（可选）" maxlength="1000" rows="2"></textarea>
          <div class="form-actions">
            <span class="char-count" id="charCount">0/1000</span>
            <button type="submit" class="btn-primary">🚀 发布新闻</button>
          </div>
        </form>
      </div>

      <div class="stats-bar">
        <span>📋 共 <strong id="newsCount">0</strong> 条新闻</span>
        <span>🟢 在线 <strong id="onlineCount">-</strong></span>
      </div>

      <div class="news-list" id="newsList">
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <p>还没有新闻，快来分享第一条吧！</p>
        </div>
      </div>
    </div>

    <!-- 右侧 -->
    <aside class="leaderboard-section">
      <div class="leaderboard-card">
        <h3>🏆 上传排行榜</h3>
        <div class="leaderboard-list" id="leaderboardList">
          <div class="empty-state small"><p>暂无排名数据</p></div>
        </div>
      </div>
      <div class="live-log" id="liveLog">
        <h4>📡 实时动态</h4>
        <div class="log-list" id="logList"></div>
      </div>
    </aside>
  </div>

  <!-- ═══ 管理员密钥弹窗（面板打开前必须验证） ═══ -->
  <div class="modal-overlay" id="adminKeyOverlay" style="display:none;">
    <div class="modal-box">
      <h3>🔐 管理员验证</h3>
      <p class="modal-target">请输入管理员密钥以继续</p>
      <input type="password" id="adminKeyInput" placeholder="输入或粘贴管理员密钥" maxlength="300" autocomplete="off">
      <div class="modal-actions">
        <button id="adminKeyCancel" class="btn-outline">取消</button>
        <button id="adminKeyConfirm" class="btn-primary">验证</button>
      </div>
    </div>
  </div>

  <!-- ═══ 管理员面板（弹窗） ═══ -->
  <div class="admin-overlay" id="adminOverlay" style="display:none;">
    <div class="admin-panel">
      <div class="admin-panel-header">
        <h2>⚙️ 管理面板</h2>
        <button id="adminCloseBtn" class="btn-close">✕</button>
      </div>

      <!-- Tab 切换 -->
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="news">📰 每日新闻</button>
        <button class="admin-tab" data-tab="users">👥 用户管理</button>
      </div>

      <!-- Tab: 每日新闻 -->
      <div class="admin-tab-content" id="tabNews">
        <div class="admin-toolbar">
          <input type="date" id="adminDateFilter" class="input-date">
          <button id="adminCopyToday" class="btn-sm btn-copy">📋 复制当天新闻</button>
        </div>
        <div class="admin-news-list" id="adminNewsList">
          <div class="empty-state small"><p>该日期暂无新闻</p></div>
        </div>
      </div>

      <!-- Tab: 用户管理 -->
      <div class="admin-tab-content" id="tabUsers" style="display:none;">
        <div class="admin-user-list" id="adminUserList">
          <div class="empty-state small"><p>暂无用户</p></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 改密弹窗 -->
  <div class="modal-overlay" id="pwdModalOverlay" style="display:none;">
    <div class="modal-box">
      <h3>🔑 修改密码</h3>
      <p class="modal-target" id="pwdModalTarget"></p>
      <input type="password" id="pwdModalInput" placeholder="输入新密码（至少4位）" maxlength="50">
      <div class="modal-actions">
        <button id="pwdModalCancel" class="btn-outline">取消</button>
        <button id="pwdModalConfirm" class="btn-primary">确认修改</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
