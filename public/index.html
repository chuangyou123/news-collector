<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📰 新闻收集站</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4F46E5">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>📰 新闻收集站</h1>
      <div class="user-area" id="userArea">
        <input type="text" id="usernameInput" placeholder="昵称" maxlength="20" autocomplete="username">
        <input type="password" id="passwordInput" placeholder="密码" maxlength="50" autocomplete="current-password">
        <button id="loginBtn" class="btn-primary-sm">登录</button>
        <button id="switchToRegisterBtn" class="btn-outline-sm">注册</button>
      </div>
      <div class="user-info" id="userInfo" style="display:none;">
        <span class="user-badge" id="userBadge"></span>
        <button id="notifBtn" class="btn-admin" style="display:none;position:relative" title="通知">🔔<span id="notifBadge" style="display:none;position:absolute;top:-4px;right:-4px;background:red;color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;line-height:16px;text-align:center">0</span></button>
        <button id="adminBtn" class="btn-admin" style="display:none;" title="管理面板">⚙️</button>
        <button id="logoutBtn" class="btn-sm">退出</button>
      </div>
    </div>
  </header>

  <nav class="main-tabs">
    <button class="main-tab active" data-tab="publish">📝 发布新闻</button>
    <button class="main-tab" data-tab="library">📚 新闻库</button>
    <button class="main-tab" data-tab="rank">🏆 排行榜</button>
    <button class="main-tab" data-tab="hot">🔥 热门</button>
    <a href="/api/rss" style="margin-left:auto;padding:6px 12px;background:#F97316;color:#fff;border-radius:6px;text-decoration:none;font-size:.8rem;font-weight:600">📡 RSS</a>
    <select id="tagFilter" style="display:none;padding:6px 10px;border-radius:6px;border:1px solid #ccc"><option value="">全部标签</option></select>
    <button id="darkToggle" style="margin-left:auto;background:none;border:none;font-size:1.2rem;cursor:pointer" title="深色模式">🌙</button>
    <span class="total-count">本站已收录 <strong id="totalCount">0</strong> 条新闻</span>
  </nav>

  <div class="announce-banner" id="announceBanner" style="display:none">
    <div class="announce-inner">
      <span class="announce-icon">📢</span>
      <span class="announce-text" id="announceText"></span>
      <span class="announce-time" id="announceTime"></span>
    </div>
  </div>

  <div class="sort-row">
    <button class="sort-btn active" data-sort="new">🕐 最新</button>
    <button class="sort-btn" data-sort="hot">🔥 最热</button>
  </div>

  <div class="main-container">
    <div class="tab-content" id="tabPublish">
      <div class="upload-card" id="uploadCard" style="display:none;">
        <h3>📝 分享新闻</h3>
        <form id="newsForm" autocomplete="off">
          <textarea id="contentInput" placeholder="写点什么...（5-500字）" maxlength="500" rows="3"></textarea>
          <select id="tagSelect" style="margin-top:8px;padding:6px 10px;border-radius:6px;border:1px solid #ccc;width:100%"><option value="">选择标签（可选）</option></select>
          <div class="form-actions">
            <span class="char-count" id="charCount">0/500</span>
            <button type="submit" class="btn-primary">🚀 发布</button>
          </div>
        </form>
      </div>
      <div class="news-list" id="newsList">
        <div class="empty-state"><div class="empty-icon">📭</div><p>还没有新闻</p></div>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>

    <div class="tab-content" id="tabLibrary" style="display:none;">
      <div class="library-toolbar">
        <button id="downloadBtn" class="btn-primary">📥 下载全部新闻</button>
        <input type="text" id="searchInput" placeholder="🔍 搜索新闻..." class="input-search">
      </div>
      <div class="library-list" id="libraryList">
        <div class="empty-state"><p>加载中...</p></div>
      </div>
    </div>

    <div class="tab-content" id="tabRank" style="display:none;">
      <div class="leaderboard-card"><h3>🏆 上传排行榜</h3><div class="leaderboard-list" id="leaderboardList"><div class="empty-state small"><p>暂无排名</p></div></div></div>
    </div>
  </div>

  <div class="modal-overlay" id="adminKeyOverlay" style="display:none;">
    <div class="modal-box"><h3>🔐 管理员验证</h3><p class="modal-target">请输入管理员密钥</p><input type="password" id="adminKeyInput" placeholder="粘贴密钥" maxlength="300"><div class="modal-actions"><button id="adminKeyCancel" class="btn-outline">取消</button><button id="adminKeyConfirm" class="btn-primary">验证</button></div></div>
  </div>

  <div class="admin-overlay" id="adminOverlay" style="display:none;">
    <div class="admin-panel"><div class="admin-panel-header"><h2>⚙️ 管理面板</h2><button id="adminCloseBtn" class="btn-close">✕</button></div><div class="admin-tabs"><button class="admin-tab active" data-tab="news">📰 每日新闻</button><button class="admin-tab" data-tab="users">👥 用户管理</button><button class="admin-tab" data-tab="announce">📢 公告</button><button class="admin-tab" data-tab="reports">🚩 举报</button></div><div class="admin-tab-content" id="tabNews"><div class="admin-toolbar"><input type="date" id="adminDateFilter" class="input-date"><button id="adminCopyToday" class="btn-sm btn-copy">📋 复制新闻</button></div><div class="admin-news-list" id="adminNewsList"></div></div><div class="admin-tab-content" id="tabUsers" style="display:none;"><div class="admin-user-list" id="adminUserList"></div></div><div class="admin-tab-content" id="tabAnnounce" style="display:none;"><input id="announceInput" style="width:100%;padding:8px;margin:8px 0;border:1px solid #ddd;border-radius:6px" placeholder="输入公告内容..."><button class="btn-primary" onclick="postAnnounce()" style="margin-bottom:12px">📢 发布公告</button><div id="announceList"></div></div><div class="admin-tab-content" id="tabReports" style="display:none;"><div class="admin-user-list" id="adminReportList"></div></div></div>
  </div>

  <div class="modal-overlay" id="pwdModalOverlay" style="display:none;">
    <div class="modal-box"><h3>🔑 修改密码</h3><p class="modal-target" id="pwdModalTarget"></p><input type="password" id="pwdModalInput" placeholder="新密码（至少4位）" maxlength="50"><div class="modal-actions"><button id="pwdModalCancel" class="btn-outline">取消</button><button id="pwdModalConfirm" class="btn-primary">确认</button></div></div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/app.js?v=3"></script>
</body>
</html>
